<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>el ovalo solitario</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Arial Black', Gadget, sans-serif; 
            background-color: #000;
        }
        canvas { display: block; }
        
        /* Interfaz de usuario estilo Ventana de Minijuego */
        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 550px;
            background: linear-gradient(180deg, #0055ff 0%, #0011aa 100%);
            color: #fff;
            padding: 15px;
            border: 4px solid #ffffff;
            box-shadow: 0px 0px 15px #00ffff, inset 0px 0px 10px #000;
            border-radius: 15px;
            display: none; 
            text-align: center;
        }
        
        #dialogo { 
            font-size: 16px; 
            text-shadow: 2px 2px 0px #000; 
            margin-bottom: 15px; 
            font-weight: bold;
        }

        .btn-opcion {
            background: linear-gradient(180deg, #ffcc00 0%, #ff6600 100%);
            color: #fff;
            border: 2px solid #fff;
            box-shadow: 2px 2px 0px #000;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            border-radius: 8px;
            text-shadow: 1px 1px 0px #000;
        }
        .btn-opcion:hover { 
            background: linear-gradient(180deg, #00ff00 0%, #009900 100%);
            transform: scale(1.05);
        }

        /* Marcador flotante de los 2000 */
        #hud-retro {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #00ff00;
            background: rgba(0, 0, 0, 0.75);
            padding: 10px 15px;
            border: 2px dashed #00ff00;
            border-radius: 4px;
            pointer-events: none;
            font-size: 12px;
            line-height: 1.5;
        }

        /* Letrero de Carga de Internet Lento */
        #loading-tag {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ff0055;
            color: white;
            padding: 10px 20px;
            font-size: 20px;
            border: 3px solid white;
            display: none;
            animation: parpadeo 0.5s infinite;
        }

        @keyframes parpadeo {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud-retro">
        <span style="color:#ff00ff; font-size:16px;">MISION: CONSEGUIR NOVIA</span><br>
        • CONTROLES: WASD / FLECHITAS<br>
        • SALTO: ESPACIO<br>
        • CHANCE DE ÉXITO: 45% (¡ES POSIBLE!)
    </div>

    <div id="loading-tag">¡¡CONECTANDO CON ÓVALA NPC!!</div>

    <div id="ui-container">
        <div id="dialogo">Cargando...</div>
        <div id="opciones-container"></div>
    </div>

    <script>
        // --- CONFIGURACIÓN DE ESCENA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0088cc); 
        scene.fog = new THREE.FogExp2(0x0088cc, 0.03);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 15, 10);
        scene.add(dirLight);

        // El Suelo y Rejilla Retro
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x112244, roughness: 0.2, metalness: 0.5 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const gridHelper = new THREE.GridHelper(100, 50, 0x00ff00, 0x00aa00);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // --- ÓVALOS ---
        const ovalGeo = new THREE.SphereGeometry(1, 32, 32);
        
        const playerMat = new THREE.MeshPhongMaterial({ color: 0x00ffff, shininess: 100 });
        const player = new THREE.Mesh(ovalGeo, playerMat);
        player.scale.set(0.7, 1.4, 0.7);
        player.position.set(0, 1.4, 0);
        scene.add(player);

        const npcMat = new THREE.MeshPhongMaterial({ color: 0xff00ff, shininess: 100 });
        const npc = new THREE.Mesh(ovalGeo, npcMat);
        npc.scale.set(0.7, 1.4, 0.7);
        npc.position.set(0, 1.4, -10);
        scene.add(npc);

        // Partículas para la celebración del final bueno
        let fireworks = [];
        function crearFuegosArtificiales() {
            const partGeo = new THREE.SphereGeometry(0.1, 8, 8);
            for(let i=0; i<50; i++) {
                const partMat = new THREE.MeshBasicMaterial({ color: Math.random() * 0xffffff });
                const p = new THREE.Mesh(partGeo, partMat);
                p.position.copy(npc.position);
                p.position.y += 2;
                p.userData = {
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: (Math.random() - 0.3) * 0.3,
                    vz: (Math.random() - 0.5) * 0.3
                };
                scene.add(p);
                fireworks.push(p);
            }
        }

        // --- CONTROLES Y FÍSICAS ---
        const keys = { w:0, a:0, s:0, d:0, ArrowUp:0, ArrowDown:0, ArrowLeft:0, ArrowRight:0, Space: 0 };
        let vy = 0;
        let isJumping = false;
        const gravity = -0.012; 
        const speed = 0.16;

        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space') keys.Space = true;
            if(e.key in keys) keys[e.key] = true;
        });
        window.addEventListener('keyup', (e) => {
            if(e.code === 'Space') keys.Space = false;
            if(e.key in keys) keys[e.key] = false;
        });

        // --- SISTEMA DE DIÁLOGOS CON AZAR (45% CHANCE) ---
        const ui = document.getElementById('ui-container');
        const loader = document.getElementById('loading-tag');
        const dialogoTxt = document.getElementById('dialogo');
        const opcionesContainer = document.getElementById('opciones-container');
        let hablando = false;
        let juegoGanado = false;

        const historia = {
            inicio: {
                texto: "ÓVALA: 'Hola... Te vi saltando por ahí. ¿Qué quieres?'",
                opciones: [
                    { texto: "Me pareciste muy linda... ¿Quieres ser mi novia?", siguiente: "calcularAmor" },
                    { texto: "Ehh... nada, me equivoqué de plano cartesiano.", siguiente: "huida" }
                ]
            },
            huida: {
                texto: "ÓVALA: 'Ah, bueno. Qué raro eres.'",
                opciones: [{ texto: "Volver a intentar", siguiente: "reiniciar" }]
            },
            rechazo: {
                texto: "ÓVALA: 'Lo siento, eres un buen óvalo pero mi corazón le pertenece a un cilindro súper guapo. Seamos amigos.' (55% de probabilidad de rechazo)",
                opciones: [{ texto: "F en el chat (Reintentar)", siguiente: "reiniciar" }]
            },
            victoria: {
                texto: "ÓVALA: '¡SÍ! Me encantan los óvalos atrevidos. ¡Salgamos de este juego flash juntos!' (¡45% DE ÉXITO LOGRADO!)",
                opciones: [{ texto: "¡VAMOSSS! (Jugar de nuevo)", siguiente: "reiniciar" }]
            }
        };

        function iniciarConversacion() {
            hablando = true;
            loader.style.display = 'block'; 

            setTimeout(() => {
                loader.style.display = 'none';
                ui.style.display = 'block';
                cargarNodo("inicio");
            }, 1000); 
        }

        function cargarNodo(nodoId) {
            // Lógica de probabilidad del 45%
            if(nodoId === "calcularAmor") {
                const suerte = Math.random() * 100; // Saca un número del 0 al 100
                if(suerte <= 45) {
                    nodoId = "victoria";
                    juegoGanado = true;
                    crearFuegosArtificiales();
                } else {
                    nodoId = "rechazo";
                }
            }

            if(nodoId === "reiniciar") {
                ui.style.display = 'none';
                hablando = false;
                juegoGanado = false;
                // Limpiar fuegos artificiales viejos
                fireworks.forEach(p => scene.remove(p));
                fireworks = [];
                player.position.set(0, 1.4, 0);
                return;
            }

            const nodo = historia[nodoId];
            dialogoTxt.innerText = nodo.texto;
            opcionesContainer.innerHTML = "";

            nodo.opciones.forEach(opc => {
                const btn = document.createElement('button');
                btn.className = 'btn-opcion';
                btn.innerText = opc.texto;
                btn.onclick = () => cargarNodo(opc.siguiente);
                opcionesContainer.appendChild(btn);
            });
        }

        // --- BUCLE DE ANIMACIÓN ---
        camera.position.set(0, 5, 10);

        function animate() {
            requestAnimationFrame(animate);

            npc.rotation.y += 0.01;

            // Animación de fuegos artificiales si ganas
            if (juegoGanado) {
                fireworks.forEach(p => {
                    p.position.x += p.userData.vx;
                    p.position.y += p.userData.vy;
                    p.position.z += p.userData.vz;
                    p.userData.vy -= 0.005; // gravedad de la partícula
                });
            }

            if (!hablando) {
                if (keys.w || keys.ArrowUp) player.position.z -= speed;
                if (keys.s || keys.ArrowDown) player.position.z += speed;
                if (keys.a || keys.ArrowLeft) player.position.x -= speed;
                if (keys.d || keys.ArrowRight) player.position.x += speed;

                if (keys.Space && !isJumping) {
                    vy = 0.23;
                    isJumping = true;
                }

                if (isJumping) {
                    player.position.y += vy;
                    vy += gravity;
                    if (player.position.y <= 1.4) {
                        player.position.y = 1.4;
                        isJumping = false;
                        vy = 0;
                    }
                }

                camera.position.x = player.position.x;
                camera.position.z = player.position.z + 7;
                camera.position.y = player.position.y + 3.5;
                camera.lookAt(player.position);

                const distancia = player.position.distanceTo(npc.position);
                if (distancia < 2.0) {
                    iniciarConversacion();
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
