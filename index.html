<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Óvalo Buscando Amor (Dificultad 99%)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        
        /* Interfaz de usuario (UI) */
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.85);
            color: #00ff00;
            padding: 20px;
            border: 2px solid #00ff00;
            border-radius: 10px;
            display: none; /* Se activa al hablar */
            text-align: center;
        }
        #dialogo { font-size: 18px; margin-bottom: 15px; }
        .btn-opcion {
            background: #222;
            color: #fff;
            border: 1px solid #00ff00;
            padding: 8px 15px;
            margin: 5px;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-opcion:hover { background: #00ff00; color: #000; }
        #instrucciones {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
    <!-- Cargamos Three.js desde CDNs de forma limpia -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="instrucciones">
        <h3>Óvalo Solitario 3D</h3>
        <p>Moverse: WASD o Flechas</p>
        <p>Saltar: Barra Espaciadora</p>
        <p>Objetivo: Acércate a la Óvala rosa para hablar.</p>
    </div>

    <div id="ui-container">
        <div id="dialogo">Hola...</div>
        <div id="opciones-container"></div>
    </div>

    <script>
        // --- CONFIGURACIÓN DE THREE.JS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Luces
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 15);
        scene.add(dirLight);

        // El Suelo
        const floorGeo = new THREE.PlaneGeometry(50, 50);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x16213e });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- CREACIÓN DE PERSONAJES (ÓVALOS) ---
        // Usamos una esfera y la escalamos en el eje Y para hacerla un óvalo (huevo)
        
        // Jugador (Óvalo Azul)
        const ovalGeo = new THREE.SphereGeometry(1, 32, 32);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0x00d2fc });
        const player = new THREE.Mesh(ovalGeo, playerMat);
        player.scale.set(0.7, 1.4, 0.7); // Aquí se vuelve óvalo
        player.position.set(0, 1.4, 0);
        scene.add(player);

        // NPC (Óvala Rosa - El interés amoroso imposible)
        const npcMat = new THREE.MeshStandardMaterial({ color: 0xff7597 });
        const npc = new THREE.Mesh(ovalGeo, npcMat);
        npc.scale.set(0.7, 1.4, 0.7);
        npc.position.set(0, 1.4, -8); // Un poco alejada
        scene.add(npc);

        // --- LÓGICA DE MOVIMIENTO Y FÍSICAS SIMPLES ---
        const keys = { w:0, a:0, s:0, d:0, ArrowUp:0, ArrowDown:0, ArrowLeft:0, ArrowRight:0, Space: 0 };
        let vy = 0;
        let isJumping = false;
        const gravity = -0.01;
        const speed = 0.15;

        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space') keys.Space = true;
            if(e.key in keys) keys[e.key] = true;
            if(e.code in keys) keys[e.code] = true; // Para la barra espaciadora
        });
        window.addEventListener('keyup', (e) => {
            if(e.code === 'Space') keys.Space = false;
            if(e.key in keys) keys[e.key] = false;
            if(e.code in keys) keys[e.code] = false;
        });

        // --- SISTEMA DE DIÁLOGO (Dificultad 99%) ---
        const ui = document.getElementById('ui-container');
        const dialogoTxt = document.getElementById('dialogo');
        const opcionesContainer = document.getElementById('opciones-container');
        let hablando = false;

        const historia = {
            inicio: {
                texto: "Óvala: 'Hola... ¿te conozco?'",
                opciones: [
                    { texto: "Hola, eres muy bonita. ¿Quieres salir?", siguiente: "rechazoDirecto" },
                    { texto: "¡Cof! ¿Vienes seguido por este plano 3D?", siguiente: "friendzone" }
                ]
            },
            rechazoDirecto: {
                texto: "Óvala: 'Tengo novio. Es un cubo perfecto de 2x2. Lo siento.'",
                opciones: [{ texto: "*Llorar en ovals*", siguiente: "final" }]
            },
            friendzone: {
                texto: "Óvala: 'Ay qué lindo, me encantan los óvalos graciosos. Te presento a mi amiga la pirámide.'",
                opciones: [{ texto: "F en el chat.", siguiente: "final" }]
            },
            final: {
                texto: "GAME OVER. Te quedaste solo. Dificultad del 99% confirmada.",
                opciones: [{ texto: "Reintentar la odisea", siguiente: "reiniciar" }]
            }
        };

        function iniciarConversacion() {
            hablando = true;
            ui.style.display = 'block';
            cargarNodo("inicio");
        }

        function cargarNodo(nodoId) {
            if(nodoId === "reiniciar") {
                ui.style.display = 'none';
                hablando = false;
                player.position.set(0, 1.4, 0); // Reset posición
                return;
            }

            const nodo = historia[nodoId];
            dialogoTxt.innerText = nodo.texto;
            opcionesContainer.innerHTML = "";

            nodo.opciones.forEach(opc => {
                const btn = document.createElement('button');
                btn.className = 'btn-opcion';
                btn.innerText = opc.texto;
                btn.onclick = () => cargarNodo(opc.siguiente);
                opcionesContainer.appendChild(btn);
            });
        }


        // --- BUCLE PRINCIPAL DE ANIMACIÓN ---
        camera.position.set(0, 5, 10);
        camera.lookAt(player.position);

        function animate() {
            requestAnimationFrame(animate);

            if (!hablando) {
                // Movimiento horizontal (WASD / Flechas)
                if (keys.w || keys.ArrowUp) player.position.z -= speed;
                if (keys.s || keys.ArrowDown) player.position.z += speed;
                if (keys.a || keys.ArrowLeft) player.position.x -= speed;
                if (keys.d || keys.ArrowRight) player.position.x += speed;

                // Salto mecánico
                if ((keys.Space || keys.Spacebar) && !isJumping) {
                    vy = 0.25;
                    isJumping = true;
                }

                // Aplicar gravedad
                if (isJumping) {
                    player.position.y += vy;
                    vy += gravity;
                    if (player.position.y <= 1.4) {
                        player.position.y = 1.4;
                        isJumping = false;
                        vy = 0;
                    }
                }

                // La cámara sigue al jugador suavemente
                camera.position.x = player.position.x;
                camera.position.z = player.position.z + 8;
                camera.position.y = player.position.y + 4;
                camera.lookAt(player.position);

                // Verificar distancia con la Óvala para activar el diálogo
                const distancia = player.position.distanceTo(npc.position);
                if (distancia < 2.0) {
                    iniciarConversacion();
                }
            }

            renderer.render(scene, window.edges);
            renderer.render(scene, camera);
        }

        // Ajuste de pantalla si cambian el tamaño de la ventana
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
