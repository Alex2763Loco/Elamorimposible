<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de amor</title>
    <style>
        /* Estilo general tipo sitio de juegos Flash del 2008 */
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Arial Black', Gadget, sans-serif; 
            background-color: #000;
        }
        canvas { display: block; }
        
        /* Interfaz de usuario estilo Ventana de Minijuego */
        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 550px;
            background: linear-gradient(180deg, #0055ff 0%, #0011aa 100%);
            color: #fff;
            padding: 15px;
            border: 4px solid #ffffff;
            box-shadow: 0px 0px 15px #00ffff, inset 0px 0px 10px #000;
            border-radius: 15px;
            display: none; 
            text-align: center;
        }
        
        #dialogo { 
            font-size: 16px; 
            text-shadow: 2px 2px 0px #000; 
            margin-bottom: 15px; 
            font-weight: bold;
        }

        .btn-opcion {
            background: linear-gradient(180deg, #ffcc00 0%, #ff6600 100%);
            color: #fff;
            border: 2px solid #fff;
            box-shadow: 2px 2px 0px #000;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            border-radius: 8px;
            text-shadow: 1px 1px 0px #000;
        }
        .btn-opcion:hover { 
            background: linear-gradient(180deg, #00ff00 0%, #009900 100%);
            transform: scale(1.05);
        }

        /* Marcador flotante de los 2000 */
        #hud-retro {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #00ff00;
            background: rgba(0, 0, 0, 0.75);
            padding: 10px 15px;
            border: 2px dashed #00ff00;
            border-radius: 4px;
            pointer-events: none;
            font-size: 12px;
            line-height: 1.5;
        }

        /* Letrero de Carga de Internet Lento */
        #loading-tag {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ff0055;
            color: white;
            padding: 10px 20px;
            font-size: 20px;
            border: 3px solid white;
            display: none;
            animation: parpadeo 0.5s infinite;
        }

        @keyframes parpadeo {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
    <!-- Motor 3D Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud-retro">
        <span style="color:#ff00ff; font-size:16px;">MISION: CONSEGUIR NOVIA</span><br>
        • CONTROLES: WASD / FLECHITAS<br>
        • SALTO: ESPACIO<br>
        • DIFICULTAD: 99.9% (IMPOSIBLE)
    </div>

    <div id="loading-tag">¡¡CONECTANDO CON ÓVALA NPC!!</div>

    <div id="ui-container">
        <div id="dialogo">Cargando...</div>
        <div id="opciones-container"></div>
    </div>

    <script>
        // --- CONFIGURACIÓN DE ESCENA (Estilo Estética Aero/Flash) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0088cc); // Azul cielo brillante de los 2000s

        // Niebla nostálgica de juego viejo
        scene.fog = new THREE.FogExp2(0x0088cc, 0.03);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Iluminación brillante tipo render viejo
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 15, 10);
        scene.add(dirLight);

        // El Suelo: Rejilla retro brillante
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0x112244, 
            roughness: 0.2,
            metalness: 0.5
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Grid (Líneas verdes encima del suelo, muy de juego indie viejo)
        const gridHelper = new THREE.GridHelper(100, 50, 0x00ff00, 0x00aa00);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // --- CREACIÓN DE PERSONAJES (ÓVALOS PLÁSTICOS) ---
        const ovalGeo = new THREE.SphereGeometry(1, 32, 32);
        
        // Jugador (Óvalo Azul brillante)
        const playerMat = new THREE.MeshPhongMaterial({ color: 0x00ffff, shininess: 100 });
        const player = new THREE.Mesh(ovalGeo, playerMat);
        player.scale.set(0.7, 1.4, 0.7);
        player.position.set(0, 1.4, 0);
        scene.add(player);

        // La Óvala (Interés amoroso color rosa chicle)
        const npcMat = new THREE.MeshPhongMaterial({ color: 0xff00ff, shininess: 100 });
        const npc = new THREE.Mesh(ovalGeo, npcMat);
        npc.scale.set(0.7, 1.4, 0.7);
        npc.position.set(0, 1.4, -10);
        scene.add(npc);

        // --- CONTROLES Y FÍSICAS ---
        const keys = { w:0, a:0, s:0, d:0, ArrowUp:0, ArrowDown:0, ArrowLeft:0, ArrowRight:0, Space: 0 };
        let vy = 0;
        let isJumping = false;
        const gravity = -0.012; // Un pelín más pesado tipo arcade
        const speed = 0.16;

        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space') keys.Space = true;
            if(e.key in keys) keys[e.key] = true;
        });
        window.addEventListener('keyup', (e) => {
            if(e.code === 'Space') keys.Space = false;
            if(e.key in keys) keys[e.key] = false;
        });

        // --- DIÁLOGOS SIN PIEDAD (99% DIFICULTAD) ---
        const ui = document.getElementById('ui-container');
        const loader = document.getElementById('loading-tag');
        const dialogoTxt = document.getElementById('dialogo');
        const opcionesContainer = document.getElementById('opciones-container');
        let hablando = false;

        const historia = {
            inicio: {
                texto: "ÓVALA: '¿Qué quieres, óvalo azul? Estoy esperando a que actualicen el servidor...'",
                opciones: [
                    { texto: "Me pareciste linda... ¿Quieres ser mi novia?", siguiente: "rechazo1" },
                    { texto: "Mira qué alto salto con la barra espaciadora", siguiente: "rechazo2" }
                ]
            },
            rechazo1: {
                texto: "ÓVALA: 'Jajaja no. Tu resolución de polígonos es bajísima y aparte no tienes skins compradas.'",
                opciones: [{ texto: "Insistir enviándole un zumbido", siguiente: "friendzone" }]
            },
            rechazo2: {
                texto: "ÓVALA: 'Qué maduro... Mi ex saltaba más alto y era un modelo 3D importado de Blender.'",
                opciones: [{ texto: "Pedirle perdón por existir", siguiente: "final" }]
            },
            friendzone: {
                texto: "ÓVALA: 'Te voy a bloquear del MSN Messenger. Quédate como amigo de las paredes.'",
                opciones: [{ texto: "*Desconectarse de internet*", siguiente: "final" }]
            },
            final: {
                texto: "¡GAME OVER! Has fallado la misión. Tu destino es ser un solterón geométrico.",
                opciones: [{ texto: "INSERTAR COIN (Reintentar)", siguiente: "reiniciar" }]
            }
        };

        function iniciarConversacion() {
            hablando = true;
            loader.style.display = 'block'; // Efecto lag de carga viejo

            setTimeout(() => {
                loader.style.display = 'none';
                ui.style.display = 'block';
                cargarNodo("inicio");
            }, 1200); // 1.2 segundos de pantalla de carga falsa
        }

        function cargarNodo(nodoId) {
            if(nodoId === "reiniciar") {
                ui.style.display = 'none';
                hablando = false;
                player.position.set(0, 1.4, 0);
                return;
            }

            const nodo = historia[nodoId];
            dialogoTxt.innerText = nodo.texto;
            opcionesContainer.innerHTML = "";

            nodo.opciones.forEach(opc => {
                const btn = document.createElement('button');
                btn.className = 'btn-opcion';
                btn.innerText = opc.texto;
                btn.onclick = () => cargarNodo(opc.siguiente);
                opcionesContainer.appendChild(btn);
            });
        }

        // --- BUCLE DE RENDERIZADO CORREGIDO ---
        camera.position.set(0, 5, 10);

        function animate() {
            requestAnimationFrame(animate);

            // Rotación leve de los personajes para que se vean dinámicos como en los juegos Flash
            npc.rotation.y += 0.01;

            if (!hablando) {
                // Controles de movimiento
                if (keys.w || keys.ArrowUp) player.position.z -= speed;
                if (keys.s || keys.ArrowDown) player.position.z += speed;
                if (keys.a || keys.ArrowLeft) player.position.x -= speed;
                if (keys.d || keys.ArrowRight) player.position.x += speed;

                // Sistema de salto
                if (keys.Space && !isJumping) {
                    vy = 0.23;
                    isJumping = true;
                }

                if (isJumping) {
                    player.position.y += vy;
                    vy += gravity;
                    if (player.position.y <= 1.4) {
                        player.position.y = 1.4;
                        isJumping = false;
                        vy = 0;
                    }
                }

                // Cámara elástica estilo retro
                camera.position.x = player.position.x;
                camera.position.z = player.position.z + 7;
                camera.position.y = player.position.y + 3.5;
                camera.lookAt(player.position);

                // Check de colisión con la óvala rosa
                const distancia = player.position.distanceTo(npc.position);
                if (distancia < 2.0) {
                    iniciarConversacion();
                }
            }

            // Un solo render limpio para que no falle nada
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
